<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <title>消消乐</title>
    </head>
    <style>
        body{
            font-family:Arial;
            background-color: aliceblue;
            margin:0;
            padding:20px;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }
        .game-board{
            width: 750px;
            margin:0;
        }
        .Container-up{
            width:100%;
            height:40%;
            background-color: rgb(248, 252, 253);
            border:2px solid #b9dafd;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-wrap:wrap;
        }
        .Container-down{
            width:100%;
            height:10%;
            background-color: #baf5e438;
            border:2px solid #9cf3e6b5;
            display: flex;
            justify-content:center;
            align-items: center;
            margin-top: 30px;
        }
        .upcell{
            width:100px;
            height:100px;
            background-color: #9fcbfb;
            display:flex;
            justify-content: center;
            align-items:center;
            margin:2px;
            font-size:40px;
        }
        .downcell{
            width:100px;
            height:100px;
            background-color: #78ec99;
            display:flex;
            justify-content: center;
            align-items:center;
            margin:2px;
            font-size:40px;
        }
    </style>
    <body>
        <div class="game-board">
            <div id="upContainer" class="Container-up"></div>
            <div id="downContainer" class="Container-down"></div>
        </div>
        <script src="game.js"></script>
    </body>
</html>
